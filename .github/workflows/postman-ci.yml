name: Automated API Verification & Smart Jira Logging

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  api-verification:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Newman and HTML Extra Reporter
      run: |
        npm install -g newman
        npm install -g newman-reporter-htmlextra

    - name: Create Reports Directory
      run: mkdir -p postman-reports

    # =======================================================================
    # CHẠY TEST BẰNG FILE OFFLINE (Giữ nguyên cấu hình cây thư mục của bạn)
    # =======================================================================
    - name: Run Admin API Tests
      run: |
        newman run "./test/resources/Admin API.postman_collection.json" \
          -r htmlextra,json \
          --reporter-htmlextra-export ./postman-reports/report-admin.html \
          --reporter-json-export ./postman-reports/summary-admin.json \
          --suppress-exit-code

    - name: Run Clinic API Tests
      run: |
        newman run "./test/resources/Clinic API.postman_collection.json" \
          -r htmlextra,json \
          --reporter-htmlextra-export ./postman-reports/report-clinic.html \
          --reporter-json-export ./postman-reports/summary-clinic.json \
          --suppress-exit-code

    - name: Run Doctor API Tests
      run: |
        newman run "./test/resources/Doctor API.postman_collection.json" \
          -r htmlextra,json \
          --reporter-htmlextra-export ./postman-reports/report-doctor.html \
          --reporter-json-export ./postman-reports/summary-doctor.json \
          --suppress-exit-code

    - name: Run Patient API Tests
      run: |
        newman run "./test/resources/Patient API.postman_collection.json" \
          -r htmlextra,json \
          --reporter-htmlextra-export ./postman-reports/report-patient.html \
          --reporter-json-export ./postman-reports/summary-patient.json \
          --suppress-exit-code

    # =======================================================================
    # SCRIPT THÔNG MINH: ĐÃ ĐƯỢC SỬA LỖI TRUYỀN BIẾN ĐA DÒNG (EOF)
    # =======================================================================
    - name: Parse Newman JSON Reports for Failures
      id: parse_errors
      run: |
        node -e '
        const fs = require("fs");
        let jiraDescription = "Hệ thống CI/CD phát hiện các ca kiểm thử API sau đây bị gãy:\n\n";
        let hasErrors = false;
        
        const files = [
          { name: "Admin API", file: "./postman-reports/summary-admin.json" },
          { name: "Clinic API", file: "./postman-reports/summary-clinic.json" },
          { name: "Doctor API", file: "./postman-reports/summary-doctor.json" },
          { name: "Patient API", file: "./postman-reports/summary-patient.json" }
        ];
        
        files.forEach(item => {
          if (fs.existsSync(item.file)) {
            const data = JSON.parse(fs.readFileSync(item.file, "utf8"));
            if (data.run && data.run.failures && data.run.failures.length > 0) {
              hasErrors = true;
              jiraDescription += `📌 *Bộ kịch bản: ${item.name}*\n`;
              data.run.failures.forEach((fail, index) => {
                const apiName = fail.source ? fail.source.name : "Không rõ API";
                let assertionError = fail.error ? fail.error.message : "Lỗi Assert";
                // Loại bỏ các ký tự có khả năng phá vỡ định dạng chuỗi
                assertionError = assertionError.replace(/[\r\n]+/g, " ");
                jiraDescription += `${index + 1}. API: _${apiName}_  ->  ❌ Lỗi: ${assertionError}\n`;
              });
              jiraDescription += "\n";
            }
          }
        });
        
        if (hasErrors) {
          // Sử dụng cú pháp EOF để truyền chuỗi đa dòng an toàn vào GITHUB_ENV
          fs.appendFileSync(process.env.GITHUB_ENV, "JIRA_ERROR_DETAILS<<EOF\n" + jiraDescription + "\nEOF\n");
          fs.appendFileSync(process.env.GITHUB_ENV, "SHOULD_CREATE_JIRA_BUG=true\n");
        } else {
          fs.appendFileSync(process.env.GITHUB_ENV, "SHOULD_CREATE_JIRA_BUG=false\n");
        }
        '

    # ==========================================
    # ĐẨY BÁO CÁO LÊN ARTIFACTS
    # ==========================================
    - name: Upload Test Reports Artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: Complete-Postman-Test-Reports
        path: postman-reports/

    # ==========================================
    # ĐĂNG NHẬP JIRA
    # ==========================================
    - name: Login to Jira
      if: env.SHOULD_CREATE_JIRA_BUG == 'true'
      uses: atlassian/gajira-login@v3
      env:
        JIRA_BASE_URL: https://ayemqh-1766052090391.atlassian.net
        JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
        JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}

    # ==========================================
    # TẠO TICKET VỚI CHI TIẾT LỖI TỰ ĐỘNG BẮN VÀO DESCRIPTION
    # ==========================================
    - name: Create Bug Ticket on Jira
      if: env.SHOULD_CREATE_JIRA_BUG == 'true'
      uses: atlassian/gajira-create@v3
      with:
        project: 'KCPM' 
        issuetype: 'Bug'
        summary: '❌ [CI/CD] Phát hiện lỗi Assert API tự động'
        description: |
          ${{ env.JIRA_ERROR_DETAILS }}
          
          *Thông tin kiểm thử:*
          - Người kích hoạt: ${{ github.actor }}
          - Nhánh code: ${{ github.ref_name }}
          - Xem biểu đồ chi tiết: Vui lòng tải file report HTML trong mục Artifacts của GitHub Actions.
        fields: '{"priority": {"name": "High"}}'
