name: Automated API Verification (Local JSON) & Jira Logging

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  api-verification:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Newman and HTML Extra Reporter
      run: |
        npm install -g newman
        npm install -g newman-reporter-htmlextra

    - name: Create Reports Directory
      run: mkdir -p postman-reports

    # =======================================================================
    # CHẠY TEST BẰNG FILE OFFLINE THEO ĐÚNG CÂY THƯ MỤC THỰC TẾ
    # =======================================================================
    - name: Run Admin API Tests
      run: |
        newman run "./test/resources/Admin API.postman_collection.json" \
          -r htmlextra,json \
          --reporter-htmlextra-export ./postman-reports/report-admin.html \
          --reporter-json-export ./postman-reports/summary-admin.json

    - name: Run Clinic API Tests
      run: |
        newman run "./test/resources/Clinic API.postman_collection.json" \
          -r htmlextra,json \
          --reporter-htmlextra-export ./postman-reports/report-clinic.html \
          --reporter-json-export ./postman-reports/summary-clinic.json

    - name: Run Doctor API Tests
      run: |
        newman run "./test/resources/Doctor API.postman_collection.json" \
          -r htmlextra,json \
          --reporter-htmlextra-export ./postman-reports/report-doctor.html \
          --reporter-json-export ./postman-reports/summary-doctor.json

    - name: Run Patient API Tests
      run: |
        newman run "./test/resources/Patient API.postman_collection.json" \
          -r htmlextra,json \
          --reporter-htmlextra-export ./postman-reports/report-patient.html \
          --reporter-json-export ./postman-reports/summary-patient.json

    # ==========================================
    # ĐẨY BÁO CÁO LÊN ARTIFACTS
    # ==========================================
    - name: Upload Test Reports Artifacts
      uses: actions/upload-artifact@v4
      if: always() # Luôn chạy để nhóm có file HTML tải về xem đồ thị kết quả
      with:
        name: Complete-Postman-Test-Reports
        path: postman-reports/

    # ==========================================
    # TỰ ĐỘNG ĐĂNG NHẬP & TẠO BUG TRÊN JIRA KHI TEST FAIL
    # ==========================================
    - name: Login to Jira
      if: failure() # Chỉ kích hoạt khi có ít nhất 1 bước test phía trên bị lỗi đỏ
      uses: atlassian/gajira-login@v3
      env:
        JIRA_BASE_URL: https://ayemqh-1766052090391.atlassian.net
        JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
        JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}

    - name: Create Bug Ticket on Jira
      if: failure()
      uses: atlassian/gajira-create@v3
      with:
        project: 'KCPM' 
        issuetype: 'Bug'
        summary: '❌ [CI/CD] Kiểm thử API tự động phát hiện lỗi hệ thống'
        description: |
          Hệ thống kiểm thử tự động Newman trên GitHub Actions phát hiện có kịch bản API bị lỗi (Fail).
          
          *Thông tin chi tiết:*
          - **Người kích hoạt:** ${{ github.actor }}
          - **Nhánh code:** ${{ github.ref_name }}
          - **Cách kiểm tra chi tiết:** Vui lòng tải file báo cáo HTML trong mục **Artifacts** của lượt chạy này trên GitHub về để kiểm tra các hàm assert bị gãy.
        fields: '{"priority": {"name": "High"}}'