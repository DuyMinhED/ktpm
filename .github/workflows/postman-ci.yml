name: Java Backend & API Test Automation Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # JOB 1: JAVA UNIT TEST (chạy độc lập, song song với job 2)
  # ============================================================
  java-unit-tests:
    name: Java Unit & Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Maven Tests
        run: |
          cd backend
          mvn test --batch-mode --no-transfer-progress

      - name: Upload Surefire Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Java-Surefire-Reports
          path: backend/target/surefire-reports/

  # ============================================================
  # JOB 2: NEWMAN API TEST + TẠO JIRA TICKET
  # ============================================================
  api-tests-and-jira:
    name: Newman API Tests & Jira Bug Creation
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Newman & HTML Reporter
        run: npm install -g newman newman-reporter-htmlextra

      - name: Create Reports Directory
        run: mkdir -p postman-reports

      # ----------------------------------------------------------
      # BƯỚC 2: CHẠY NEWMAN
      # || true để pipeline không dừng khi test fail,
      # nhưng vẫn tiếp tục sang bước tạo Jira ticket
      # ----------------------------------------------------------
      - name: Run Admin API Tests
        run: |
          newman run "./test/resources/Admin API.postman_collection.json" \
            --env-var "base_url=${{ secrets.API_BASE_URL }}" \
            -r htmlextra,json \
            --reporter-htmlextra-export ./postman-reports/report-admin.html \
            --reporter-json-export ./postman-reports/summary-admin.json \
            --reporter-htmlextra-title "Admin API Test Report" \
            || true

      - name: Run Clinic API Tests
        run: |
          newman run "./test/resources/Clinic API.postman_collection.json" \
            --env-var "base_url=${{ secrets.API_BASE_URL }}" \
            -r htmlextra,json \
            --reporter-htmlextra-export ./postman-reports/report-clinic.html \
            --reporter-json-export ./postman-reports/summary-clinic.json \
            --reporter-htmlextra-title "Clinic API Test Report" \
            || true

      - name: Run Doctor API Tests
        run: |
          newman run "./test/resources/Doctor API.postman_collection.json" \
            --env-var "base_url=${{ secrets.API_BASE_URL }}" \
            -r htmlextra,json \
            --reporter-htmlextra-export ./postman-reports/report-doctor.html \
            --reporter-json-export ./postman-reports/summary-doctor.json \
            --reporter-htmlextra-title "Doctor API Test Report" \
            || true

      - name: Run Patient API Tests
        run: |
          newman run "./test/resources/Patient API.postman_collection.json" \
            --env-var "base_url=${{ secrets.API_BASE_URL }}" \
            -r htmlextra,json \
            --reporter-htmlextra-export ./postman-reports/report-patient.html \
            --reporter-json-export ./postman-reports/summary-patient.json \
            --reporter-htmlextra-title "Patient API Test Report" \
            || true

      # ----------------------------------------------------------
      # BƯỚC 3: PARSE LỖI → CHECK TRÙNG → TẠO MỚI HOẶC COMMENT
      #
      # Logic:
      #   1. Thu thập lỗi duy nhất từ các summary JSON.
      #   2. Với mỗi lỗi, search Jira (JQL exact summary + chưa Done).
      #      - Search thất bại (network/auth) → fail-open: vẫn tạo mới,
      #        không bỏ sót bug.
      #   3. Nếu đã tồn tại → thêm comment cảnh báo vào ticket gốc.
      #   4. Nếu chưa có   → tạo ticket Bug mới, gán round-robin.
      #   5. assigneeIndex chỉ tăng khi tạo mới (không bị lệch do skip).
      # ----------------------------------------------------------
      - name: Parse Failures & Sync to Jira
        if: always() && github.ref == 'refs/heads/main'
        env:
          JIRA_BASE_URL: https://ayemqh-1766052090391.atlassian.net
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_MEMBER_IDS: ${{ secrets.JIRA_MEMBER_IDS }}
          PROJECT_KEY: 'KCPM'
          ACTOR: ${{ github.actor }}
          BRANCH: ${{ github.ref_name }}
        run: |
          node << 'EOF'
          const fs    = require("fs");
          const https = require("https");

          // ── Đọc member IDs từ Secret ────────────────────────────────────
          // JIRA_MEMBER_IDS dạng JSON array:
          // ["712020:da4a7c51-...","712020:c79c7014-...","712020:fcf34ed4-..."]
          let members;
          try {
            members = JSON.parse(process.env.JIRA_MEMBER_IDS);
            if (!Array.isArray(members) || members.length === 0) throw new Error();
          } catch {
            console.error("❌ JIRA_MEMBER_IDS không hợp lệ — kiểm tra lại Secret.");
            process.exit(1);
          }

          const BASE_URL = process.env.JIRA_BASE_URL;
          const AUTH     = Buffer.from(
            `${process.env.JIRA_USER_EMAIL}:${process.env.JIRA_API_TOKEN}`
          ).toString("base64");

          // ── Hàm gọi Jira REST API ───────────────────────────────────────
          // Trả về { status, body } để caller phân biệt được 2xx vs 4xx/5xx.
          function jiraRequest(method, path, body = null) {
            return new Promise((resolve, reject) => {
              const bodyStr = body ? JSON.stringify(body) : null;
              const url     = new URL(`${BASE_URL}${path}`);
              const headers = {
                "Authorization": `Basic ${AUTH}`,
                "Accept":        "application/json",
                "Content-Type":  "application/json",
              };
              if (bodyStr) headers["Content-Length"] = Buffer.byteLength(bodyStr);

              const req = https.request(
                { hostname: url.hostname, path: url.pathname + url.search, method, headers },
                (res) => {
                  let data = "";
                  res.on("data", (chunk) => (data += chunk));
                  res.on("end", () => {
                    try { resolve({ status: res.statusCode, body: JSON.parse(data) }); }
                    catch { resolve({ status: res.statusCode, body: data }); }
                  });
                }
              );
              req.on("error", reject);
              if (bodyStr) req.write(bodyStr);
              req.end();
            });
          }

          // ── Tìm ticket trùng trên Jira ──────────────────────────────────
          // Dùng exact-match summary (= thay vì ~) để tránh false-positive.
          // Chỉ tìm trong ticket chưa Done — bug đã fix mà tái phát sẽ tạo ticket mới.
          // Nếu Search API lỗi → fail-open (trả về null) để caller tạo mới,
          // không bỏ sót bug vì sự cố mạng hay auth tạm thời.
          async function findExistingIssue(summary) {
            const escJql = (s) => s.replace(/\\/g, "\\\\").replace(/"/g, '\\"');
            const jql    = `project = "${process.env.PROJECT_KEY}" AND summary = "${escJql(summary)}" AND statusCategory != Done`;

            try {
              const res = await jiraRequest(
                "GET",
                `/rest/api/3/search?jql=${encodeURIComponent(jql)}&maxResults=1&fields=summary,status`
              );
              if (res.status !== 200) {
                console.warn(`⚠️  Search API trả về HTTP ${res.status} — bỏ qua check trùng, sẽ tạo mới.`);
                return null; // fail-open
              }
              return res.body?.issues?.[0] ?? null;
            } catch (err) {
              console.warn(`⚠️  Search API lỗi kết nối (${err.message}) — bỏ qua check trùng, sẽ tạo mới.`);
              return null; // fail-open
            }
          }

          // ── Thêm comment cảnh báo vào ticket đã tồn tại ────────────────
          async function addWarningComment(issueKey) {
            const payload = {
              body: {
                type: "doc", version: 1,
                content: [
                  {
                    type: "paragraph",
                    content: [
                      { type: "text", text: "⚠️ [CI/CD cảnh báo] ", marks: [{ type: "strong" }] },
                      { type: "text", text: "Lỗi này tái phát trong lượt chạy pipeline mới nhất!" },
                    ]
                  },
                  {
                    type: "bulletList",
                    content: [
                      { type: "listItem", content: [{ type: "paragraph", content: [{ type: "text", text: `Người kích hoạt build: ${process.env.ACTOR}` }] }] },
                      { type: "listItem", content: [{ type: "paragraph", content: [{ type: "text", text: `Nhánh code: ${process.env.BRANCH}` }] }] },
                    ]
                  },
                  {
                    type: "paragraph",
                    content: [{ type: "text", text: "Xem báo cáo chi tiết tại mục Artifacts trên GitHub Actions." }]
                  }
                ]
              }
            };

            const res = await jiraRequest("POST", `/rest/api/3/issue/${issueKey}/comment`, payload);
            if (res.status === 201) {
              console.log(`💬 Đã thêm comment cảnh báo vào ${issueKey}.`);
            } else {
              console.error(`❌ Thêm comment vào ${issueKey} thất bại (HTTP ${res.status}).`);
            }
          }

          // ── Tạo ticket Bug mới ──────────────────────────────────────────
          async function createIssue(bug, summary, assigneeId) {
            const payload = {
              fields: {
                project:   { key: process.env.PROJECT_KEY },
                summary,
                issuetype: { name: "Bug" },
                priority:  { name: "High" },
                assignee:  { id: assigneeId },
                description: {
                  type: "doc", version: 1,
                  content: [
                    {
                      type: "paragraph",
                      content: [{ type: "text", text: "Hệ thống CI/CD phát hiện assertion bị gãy:" }]
                    },
                    {
                      type: "bulletList",
                      content: [
                        { type: "listItem", content: [{ type: "paragraph", content: [{ type: "text", text: `Bộ kịch bản: ${bug.moduleName}` }] }] },
                        { type: "listItem", content: [{ type: "paragraph", content: [{ type: "text", text: `Tên API: ${bug.apiName}` }] }] },
                        { type: "listItem", content: [{ type: "paragraph", content: [{ type: "text", text: `Chi tiết lỗi: ${bug.errorMsg}`, marks: [{ type: "strong" }] }] }] },
                        { type: "listItem", content: [{ type: "paragraph", content: [{ type: "text", text: `Người kích hoạt build: ${process.env.ACTOR}` }] }] },
                        { type: "listItem", content: [{ type: "paragraph", content: [{ type: "text", text: `Nhánh code: ${process.env.BRANCH}` }] }] },
                      ]
                    },
                    {
                      type: "paragraph",
                      content: [{ type: "text", text: "Xem báo cáo chi tiết tại mục Artifacts trên GitHub Actions." }]
                    }
                  ]
                }
              }
            };

            const res = await jiraRequest("POST", "/rest/api/3/issue", payload);
            return res.body;
          }

          // ── Thu thập lỗi duy nhất từ tất cả summary files ─────────────
          const REPORT_FILES = [
            { name: "Admin API",   file: "./postman-reports/summary-admin.json"   },
            { name: "Clinic API",  file: "./postman-reports/summary-clinic.json"  },
            { name: "Doctor API",  file: "./postman-reports/summary-doctor.json"  },
            { name: "Patient API", file: "./postman-reports/summary-patient.json" },
          ];

          const seen     = new Set();
          const failures = [];

          for (const item of REPORT_FILES) {
            if (!fs.existsSync(item.file)) continue;
            const data = JSON.parse(fs.readFileSync(item.file, "utf8"));
            for (const fail of data?.run?.failures ?? []) {
              const apiName  = fail?.source?.name ?? "Không rõ API";
              const errorMsg = (fail?.error?.message ?? "Lỗi Assert")
                .replace(/[\r\n"]+/g, " ").trim();
              const key = `${item.name}|||${apiName}|||${errorMsg}`;
              if (!seen.has(key)) {
                seen.add(key);
                failures.push({ moduleName: item.name, apiName, errorMsg });
              }
            }
          }

          if (failures.length === 0) {
            console.log("✅ Không có lỗi nào — không cần xử lý Jira.");
            process.exit(0);
          }

          console.log(`📋 Tổng lỗi duy nhất phát hiện: ${failures.length}\n`);

          // ── Xử lý tuần tự: check trùng → tạo mới hoặc comment ──────────
          // Tuần tự (không dùng Promise.all) để tránh rate limit Jira Search API.
          // assigneeIndex chỉ tăng khi tạo mới — round-robin không bị lệch
          // do các ticket bị skip.
          let created      = 0;
          let commented    = 0;
          let assigneeIdx  = 0;

          for (const bug of failures) {
            const summary  = `[CI/CD] Lỗi API: ${bug.apiName} (${bug.moduleName})`;
            const existing = await findExistingIssue(summary);

            if (existing) {
              // Ticket đã tồn tại → comment cảnh báo tái phát
              console.log(`🔍 Trùng lặp: ${existing.key} (${existing.fields?.status?.name}) — "${summary}"`);
              await addWarningComment(existing.key);
              commented++;
            } else {
              // Chưa có → tạo mới và gán round-robin
              const assigneeId = members[assigneeIdx % members.length];
              const result     = await createIssue(bug, summary, assigneeId);
              if (result?.key) {
                console.log(`✅ Tạo mới: ${result.key} — "${summary}" → gán index ${assigneeIdx % members.length}`);
                assigneeIdx++;
                created++;
              } else {
                console.error(`❌ Tạo thất bại: "${summary}"`, JSON.stringify(result));
              }
            }
          }

          console.log(`\n🏁 Hoàn tất — Tạo mới: ${created} | Comment tái phát: ${commented} | Tổng: ${failures.length}`);
          EOF

      # ----------------------------------------------------------
      # BƯỚC 4: UPLOAD ARTIFACTS (luôn chạy dù test fail)
      # ----------------------------------------------------------
      - name: Upload Test Reports Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Complete-Postman-Test-Reports
          path: postman-reports/
          retention-days: 14
