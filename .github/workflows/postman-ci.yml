name: Automated API Verification (Postman Cloud) & Jira Logging

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  api-verification:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Newman and HTML Extra Reporter
      run: |
        npm install -g newman
        npm install -g newman-reporter-htmlextra

    - name: Create Reports Directory
      run: mkdir -p postman-reports

    # =======================================================================
    # CHẠY TEST BẰNG URL POSTMAN CLOUD (Sử dụng ID trích xuất từ link của bạn)
    # =======================================================================
    - name: Run Patient API Tests
      run: |
        newman run "https://api.getpostman.com/collections/42986888-399f7570-036e-4096-b1f7-887c48c1176b?apikey=${{ secrets.POSTMAN_API_KEY }}" \
          -r htmlextra,json \
          --reporter-htmlextra-export ./postman-reports/report-patient.html \
          --reporter-json-export ./postman-reports/summary-patient.json

    # LƯU Ý: Bạn cần thay các ID chuỗi phía dưới bằng ID Collection tương ứng của Doctor, Clinic, Admin trên Postman của bạn
    - name: Run Doctor API Tests
      run: |
        newman run "https://api.getpostman.com/collections/THAY_ID_COLLECTION_DOCTOR_VÀO_ĐÂY?apikey=${{ secrets.POSTMAN_API_KEY }}" \
          -r htmlextra,json \
          --reporter-htmlextra-export ./postman-reports/report-doctor.html \
          --reporter-json-export ./postman-reports/summary-doctor.json

    - name: Run Clinic API Tests
      run: |
        newman run "https://api.getpostman.com/collections/THAY_ID_COLLECTION_CLINIC_VÀO_ĐÂY?apikey=${{ secrets.POSTMAN_API_KEY }}" \
          -r htmlextra,json \
          --reporter-htmlextra-export ./postman-reports/report-clinic.html \
          --reporter-json-export ./postman-reports/summary-clinic.json

    - name: Run Admin API Tests
      run: |
        newman run "https://api.getpostman.com/collections/THAY_ID_COLLECTION_ADMIN_VÀO_ĐÂY?apikey=${{ secrets.POSTMAN_API_KEY }}" \
          -r htmlextra,json \
          --reporter-htmlextra-export ./postman-reports/report-admin.html \
          --reporter-json-export ./postman-reports/summary-admin.json

    # ==========================================
    # ĐẨY BÁO CÁO LÊN ARTIFACTS
    # ==========================================
    - name: Upload Test Reports Artifacts
      uses: actions/upload-artifact@v4
      if: always() # Luôn luôn chạy để lấy file HTML xem lỗi
      with:
        name: Complete-Postman-Test-Reports
        path: postman-reports/

   # ==========================================
    # BƯỚC ĐĂNG NHẬP JIRA (Đã điền chuẩn URL của bạn)
    # ==========================================
    - name: Login to Jira
      if: failure() # Chỉ kích hoạt khi có bài kiểm thử Newman bị báo lỗi đỏ
      uses: atlassian/gajira-login@v3
      env:
        JIRA_BASE_URL: https://ayemqh-1766052090391.atlassian.net
        JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
        JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}

    # ==========================================
    # BƯỚC TẠO BUG TRÊN BẢNG KANBAN KCPM
    # ==========================================
    - name: Create Bug Ticket on Jira
      if: failure() # Chạy khi bước đăng nhập trên thành công và hệ thống có lỗi test
      uses: atlassian/gajira-create@v3
      with:
        project: 'KCPM' # Trùng khít với mã dự án trên link của bạn
        issuetype: 'Bug'
        summary: '❌ [CI/CD] Kiểm thử API tự động bị sập'
        description: |
          Hệ thống kiểm thử tự động Newman trên GitHub Actions phát hiện có API bị lỗi.
          
          *Thông tin chi tiết:*
          - **Người kích hoạt:** ${{ github.actor }}
          - **Nhánh code:** ${{ github.ref_name }}
          - **Hướng dẫn xử lý:** Vui lòng truy cập tab Actions trên GitHub hoặc tải file báo cáo HTML trong mục Artifacts để xem chi tiết response bị lỗi.
        fields: '{"priority": {"name": "High"}}'
