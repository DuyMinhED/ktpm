name: Java Backend & API Test Automation Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

# Hủy run cũ nếu có run mới hơn trên cùng nhánh (tiết kiệm tài nguyên)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # JOB 1: JAVA UNIT TEST (chạy độc lập, song song với job 2)
  # ============================================================
  java-unit-tests:
    name: Java Unit & Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Maven Tests
        run: |
          cd backend
          mvn test --batch-mode --no-transfer-progress

      - name: Upload Surefire Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Java-Surefire-Reports
          path: backend/target/surefire-reports/

  # ============================================================
  # JOB 2: NEWMAN API TEST + TẠO JIRA TICKET
  # ============================================================
  api-tests-and-jira:
    name: Newman API Tests & Jira Bug Creation
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      # ----------------------------------------------------------
      # BƯỚC 1: CÀI ĐẶT NODE.JS VỚI CACHE
      # ----------------------------------------------------------
      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Newman & HTML Reporter
        run: |
          npm install -g newman newman-reporter-htmlextra

      - name: Create Reports Directory
        run: mkdir -p postman-reports

      # ----------------------------------------------------------
      # BƯỚC 2: CHẠY NEWMAN (bỏ --suppress-exit-code, dùng || true
      #          để pipeline không dừng nhưng vẫn ghi nhận exit code)
      # ----------------------------------------------------------
      - name: Run Admin API Tests
        run: |
          newman run "./test/resources/Admin API.postman_collection.json" \
            --env-var "base_url=${{ secrets.API_BASE_URL }}" \
            -r htmlextra,json \
            --reporter-htmlextra-export ./postman-reports/report-admin.html \
            --reporter-json-export ./postman-reports/summary-admin.json \
            --reporter-htmlextra-title "Admin API Test Report" \
            || echo "NEWMAN_FAILED=true" >> $GITHUB_ENV

      - name: Run Clinic API Tests
        run: |
          newman run "./test/resources/Clinic API.postman_collection.json" \
            --env-var "base_url=${{ secrets.API_BASE_URL }}" \
            -r htmlextra,json \
            --reporter-htmlextra-export ./postman-reports/report-clinic.html \
            --reporter-json-export ./postman-reports/summary-clinic.json \
            --reporter-htmlextra-title "Clinic API Test Report" \
            || echo "NEWMAN_FAILED=true" >> $GITHUB_ENV

      - name: Run Doctor API Tests
        run: |
          newman run "./test/resources/Doctor API.postman_collection.json" \
            --env-var "base_url=${{ secrets.API_BASE_URL }}" \
            -r htmlextra,json \
            --reporter-htmlextra-export ./postman-reports/report-doctor.html \
            --reporter-json-export ./postman-reports/summary-doctor.json \
            --reporter-htmlextra-title "Doctor API Test Report" \
            || echo "NEWMAN_FAILED=true" >> $GITHUB_ENV

      - name: Run Patient API Tests
        run: |
          newman run "./test/resources/Patient API.postman_collection.json" \
            --env-var "base_url=${{ secrets.API_BASE_URL }}" \
            -r htmlextra,json \
            --reporter-htmlextra-export ./postman-reports/report-patient.html \
            --reporter-json-export ./postman-reports/summary-patient.json \
            --reporter-htmlextra-title "Patient API Test Report" \
            || echo "NEWMAN_FAILED=true" >> $GITHUB_ENV

      # ----------------------------------------------------------
      # BƯỚC 3: PARSE LỖI VÀ TẠO JIRA TICKET
      #   - Chỉ chạy trên nhánh main (tránh spam ticket khi dev)
      #   - Dùng https native thay vì execSync + curl
      #   - Member IDs lấy từ Secrets
      #   - Description dùng plain text (tương thích Jira Cloud ADF)
      # ----------------------------------------------------------
      - name: Parse Failures & Create Jira Bugs (Round-Robin)
        if: always() && github.ref == 'refs/heads/main'
        env:
          JIRA_BASE_URL: https://ayemqh-1766052090391.atlassian.net
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_MEMBER_IDS: ${{ secrets.JIRA_MEMBER_IDS }}   # JSON array string lưu trong Secrets
          PROJECT_KEY: 'KCPM'
          ACTOR: ${{ github.actor }}
          BRANCH: ${{ github.ref_name }}
        run: |
          node << 'EOF'
          const fs   = require("fs");
          const https = require("https");

          // ── Đọc member IDs từ Secret (JSON array) ──────────────────────
          // Secret JIRA_MEMBER_IDS có dạng:
          // ["712020:da4a7c51-...","712020:c79c7014-...","712020:fcf34ed4-...","712020:0bd697e4-...","712020:7fde86b6-..."]
          let members;
          try {
            members = JSON.parse(process.env.JIRA_MEMBER_IDS);
            if (!Array.isArray(members) || members.length === 0) throw new Error("Empty");
          } catch {
            console.error("❌ JIRA_MEMBER_IDS không hợp lệ. Vui lòng kiểm tra Secret.");
            process.exit(1);
          }

          // ── Hàm tạo Jira ticket qua https (không dùng curl) ────────────
          function createJiraIssue(payload) {
            return new Promise((resolve, reject) => {
              const auth = Buffer.from(
                `${process.env.JIRA_USER_EMAIL}:${process.env.JIRA_API_TOKEN}`
              ).toString("base64");

              const body = JSON.stringify(payload);
              const url  = new URL(`${process.env.JIRA_BASE_URL}/rest/api/3/issue`);

              const req = https.request(
                {
                  hostname: url.hostname,
                  path:     url.pathname,
                  method:   "POST",
                  headers: {
                    "Authorization": `Basic ${auth}`,
                    "Content-Type":  "application/json",
                    "Content-Length": Buffer.byteLength(body),
                  },
                },
                (res) => {
                  let data = "";
                  res.on("data", (chunk) => (data += chunk));
                  res.on("end", () => {
                    try { resolve(JSON.parse(data)); }
                    catch { resolve({ error: data }); }
                  });
                }
              );
              req.on("error", reject);
              req.write(body);
              req.end();
            });
          }

          // ── Thu thập lỗi duy nhất từ tất cả summary files ─────────────
          const files = [
            { name: "Admin API",   file: "./postman-reports/summary-admin.json"   },
            { name: "Clinic API",  file: "./postman-reports/summary-clinic.json"  },
            { name: "Doctor API",  file: "./postman-reports/summary-doctor.json"  },
            { name: "Patient API", file: "./postman-reports/summary-patient.json" },
          ];

          const uniqueErrors      = new Set();
          const failuresToProcess = [];

          files.forEach((item) => {
            if (!fs.existsSync(item.file)) return;
            const data = JSON.parse(fs.readFileSync(item.file, "utf8"));
            (data?.run?.failures ?? []).forEach((fail) => {
              const apiName  = fail?.source?.name ?? "Không rõ API";
              const errorMsg = (fail?.error?.message ?? "Lỗi Assert")
                .replace(/[\r\n"]+/g, " ")
                .trim();

              const key = `${item.name}|||${apiName}|||${errorMsg}`;
              if (!uniqueErrors.has(key)) {
                uniqueErrors.add(key);
                failuresToProcess.push({ moduleName: item.name, apiName, errorMsg });
              }
            });
          });

          if (failuresToProcess.length === 0) {
            console.log("✅ Không có lỗi nào cần tạo ticket.");
            process.exit(0);
          }

          console.log(`📋 Tổng lỗi duy nhất cần xử lý: ${failuresToProcess.length}`);

          // ── Tạo ticket song song (Promise.all) ────────────────────────
          const tasks = failuresToProcess.map((bug, idx) => {
            const assigneeId = members[idx % members.length];

            // Dùng Atlassian Document Format (ADF) — tương thích Jira Cloud
            const payload = {
              fields: {
                project:     { key: process.env.PROJECT_KEY },
                summary:     `[CI/CD] Lỗi API: ${bug.apiName} (${bug.moduleName})`,
                issuetype:   { name: "Bug" },
                priority:    { name: "High" },
                assignee:    { id: assigneeId },
                description: {
                  type:    "doc",
                  version: 1,
                  content: [
                    {
                      type: "paragraph",
                      content: [
                        { type: "text", text: "Hệ thống CI/CD phát hiện assertion bị gãy:" }
                      ]
                    },
                    {
                      type: "bulletList",
                      content: [
                        { type: "listItem", content: [{ type: "paragraph", content: [{ type: "text", text: `Bộ kịch bản: ${bug.moduleName}` }] }] },
                        { type: "listItem", content: [{ type: "paragraph", content: [{ type: "text", text: `Tên API: ${bug.apiName}` }] }] },
                        { type: "listItem", content: [{ type: "paragraph", content: [{ type: "text", text: `Chi tiết lỗi: ${bug.errorMsg}`, marks: [{ type: "strong" }] }] }] },
                        { type: "listItem", content: [{ type: "paragraph", content: [{ type: "text", text: `Người kích hoạt build: ${process.env.ACTOR}` }] }] },
                        { type: "listItem", content: [{ type: "paragraph", content: [{ type: "text", text: `Nhánh code: ${process.env.BRANCH}` }] }] },
                      ]
                    },
                    {
                      type: "paragraph",
                      content: [
                        { type: "text", text: "Xem báo cáo chi tiết tại mục Artifacts trên GitHub Actions." }
                      ]
                    }
                  ]
                }
              }
            };

            return createJiraIssue(payload).then((res) => {
              if (res.key) {
                console.log(`✅ [${bug.apiName}] → ${res.key} (gán cho member index ${idx % members.length})`);
              } else {
                console.error(`❌ [${bug.apiName}] → Tạo ticket thất bại:`, JSON.stringify(res));
              }
            });
          });

          Promise.all(tasks).then(() => console.log("🏁 Hoàn tất tạo Jira tickets."));
          EOF

      # ----------------------------------------------------------
      # BƯỚC 4: UPLOAD ARTIFACTS (luôn chạy dù test fail)
      # ----------------------------------------------------------
      - name: Upload Test Reports Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Complete-Postman-Test-Reports
          path: postman-reports/
          retention-days: 14    # Tự xóa sau 14 ngày, tiết kiệm storage
