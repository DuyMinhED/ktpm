name: Automated API Verification & Round-Robin Jira Logging

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  api-verification:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Newman and HTML Extra Reporter
      run: |
        npm install -g newman
        npm install -g newman-reporter-htmlextra

    - name: Create Reports Directory
      run: mkdir -p postman-reports

    # =======================================================================
    # CHẠY TEST BẰNG FILE OFFLINE (Giữ nguyên cấu hình cây thư mục của bạn)
    # =======================================================================
    - name: Run Admin API Tests
      run: |
        newman run "./test/resources/Admin API.postman_collection.json" \
          -r htmlextra,json \
          --reporter-htmlextra-export ./postman-reports/report-admin.html \
          --reporter-json-export ./postman-reports/summary-admin.json \
          --suppress-exit-code

    - name: Run Clinic API Tests
      run: |
        newman run "./test/resources/Clinic API.postman_collection.json" \
          -r htmlextra,json \
          --reporter-htmlextra-export ./postman-reports/report-clinic.html \
          --reporter-json-export ./postman-reports/summary-clinic.json \
          --suppress-exit-code

    - name: Run Doctor API Tests
      run: |
        newman run "./test/resources/Doctor API.postman_collection.json" \
          -r htmlextra,json \
          --reporter-htmlextra-export ./postman-reports/report-doctor.html \
          --reporter-json-export ./postman-reports/summary-doctor.json \
          --suppress-exit-code

    - name: Run Patient API Tests
      run: |
        newman run "./test/resources/Patient API.postman_collection.json" \
          -r htmlextra,json \
          --reporter-htmlextra-export ./postman-reports/report-patient.html \
          --reporter-json-export ./postman-reports/summary-patient.json \
          --suppress-exit-code

    # =======================================================================
    # SCRIPT TỐI ƯU: XOAY VÒNG CHO 5 THÀNH VIÊN & LỌC TRÙNG LỖI TUYỆT ĐỐI
    # =======================================================================
    - name: Parse Failures and Assign Round-Robin to 5 Members
      env:
        JIRA_BASE_URL: https://ayemqh-1766052090391.atlassian.net
        JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
        JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        PROJECT_KEY: 'KCPM'
        ACTOR: ${{ github.actor }}
        BRANCH: ${{ github.ref_name }}
      run: |
        node -e '
        const fs = require("fs");
        const { execSync } = require("child_process");
        
        const files = [
          { name: "Admin API", file: "./postman-reports/summary-admin.json" },
          { name: "Clinic API", file: "./postman-reports/summary-clinic.json" },
          { name: "Doctor API", file: "./postman-reports/summary-doctor.json" },
          { name: "Patient API", file: "./postman-reports/summary-patient.json" }
        ];
        
        // 🌟 ĐÃ NẠP CHÍNH XÁC 5 MÃ ACCOUNT ID JIRA CỦA NHÓM BẠN
        const members = [
          "712020:da4a7c51-9bb8-4022-b0a6-698b8fb78315",
          "712020:c79c7014-81e9-4ddb-a7d1-f3679f96d55c",
          "712020:fcf34ed4-07e4-4a6b-9f74-addf47f032f1",
          "712020:0bd697e4-f5b4-4767-b9f5-fae031ed3398",
          "712020:7fde86b6-fe0a-4823-b86c-0ddeca871b90"
        ];
        
        const auth = Buffer.from(`${process.env.JIRA_USER_EMAIL}:${process.env.JIRA_API_TOKEN}`).toString("base64");
        let totalBugCount = 0;
        
        // Sử dụng Set để tránh ghi nhận lặp lại một lỗi trong cùng lượt chạy
        const uniqueErrors = new Set();
        const failuresToProcess = [];
        
        // Bước 1: Quét và gom các lỗi duy nhất
        files.forEach(item => {
          if (fs.existsSync(item.file)) {
            const data = JSON.parse(fs.readFileSync(item.file, "utf8"));
            if (data.run && data.run.failures && data.run.failures.length > 0) {
              data.run.failures.forEach((fail) => {
                const apiName = fail.source ? fail.source.name : "Không rõ API";
                let assertionError = fail.error ? fail.error.message : "Lỗi Assert";
                
                // Làm sạch kỹ chuỗi lỗi tránh vỡ cấu trúc JSON khi gọi curl
                assertionError = assertionError.replace(/[\r\n\"]+/g, " ");
                
                const errorKey = `${item.name}|||${apiName}|||${assertionError}`;
                
                if (!uniqueErrors.has(errorKey)) {
                  uniqueErrors.add(errorKey);
                  failuresToProcess.push({
                    moduleName: item.name,
                    apiName: apiName,
                    errorMsg: assertionError
                  });
                }
              });
            }
          }
        });
        
        // Bước 2: Chạy vòng lặp bắn API sang Jira tạo thẻ lỗi đơn lẻ và gán xoay vòng
        failuresToProcess.forEach((bug) => {
          const assigneeId = members[totalBugCount % members.length];
          totalBugCount++;
          
          const summary = `❌ [CI/CD] Lỗi API: ${bug.apiName} (${bug.moduleName})`;
          const description = `Hệ thống kiểm thử tự động phát hiện ca assert này bị gãy:\n\n` +
                              `* Bộ kịch bản: ${bug.moduleName}\n` +
                              `* Tên API: ${bug.apiName}\n` +
                              `* Chi tiết lỗi: {color:red}${bug.errorMsg}{color}\n\n` +
                              `---\n` +
                              `* Người kích hoạt build: ${process.env.ACTOR}\n` +
                              `* Nhánh code: ${process.env.BRANCH}\n` +
                              `* Chi tiết đồ thị: Tải file báo cáo HTML trong mục Artifacts trên GitHub.`;
          
          const jiraData = {
            fields: {
              project: { key: process.env.PROJECT_KEY },
              summary: summary,
              description: description,
              issuetype: { name: "Bug" },
              priority: { name: "High" },
              assignee: { id: assigneeId }
            }
          };
          
          try {
            const curlCommand = `curl -s -X POST -H "Authorization: Basic ${auth}" ` +
                                `-H "Content-Type: application/json" ` +
                                `-d @- "${process.env.JIRA_BASE_URL}/rest/api/2/issue"`;
            
            const response = execSync(curlCommand, { input: JSON.stringify(jiraData), encoding: "utf8" });
            const resJson = JSON.parse(response);
            console.log(`✅ Đã tạo Bug [${bug.apiName}] -> Gán xoay vòng cho Thành viên [${assigneeId}] (${resJson.key})`);
          } catch (error) {
            console.error(`❌ Lỗi tạo thẻ cho API [${bug.apiName}]:`, error.message);
          }
        });
        '

    # ==========================================
    # ĐẨY BÁO CÁO LÊN ARTIFACTS (Vẫn luôn chạy để lưu trữ)
    # ==========================================
    - name: Upload Test Reports Artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: Complete-Postman-Test-Reports
        path: postman-reports/
