name: Automated API Verification & Jira Bug Logging

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  api-verification:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-with-version: '20'

    - name: Install Newman and HTML Extra Reporter
      run: |
        npm install -g newman
        npm install -g newman-reporter-htmlextra

    - name: Create Reports Directory
      run: mkdir -p postman-reports

    # ==========================================
    # CHẠY TEST & XUẤT ĐỒNG THỜI FILE HTML + JSON
    # ==========================================
    - name: Run Patient API Tests
      run: |
        newman run "./Patient API.postman_collection.json" \
          -r htmlextra,json \
          --reporter-htmlextra-export ./postman-reports/report-patient.html \
          --reporter-json-export ./postman-reports/summary-patient.json

    - name: Run Doctor API Tests
      run: |
        newman run "./Doctor API.postman_collection.json" \
          -r htmlextra,json \
          --reporter-htmlextra-export ./postman-reports/report-doctor.html \
          --reporter-json-export ./postman-reports/summary-doctor.json

    - name: Run Clinic API Tests
      run: |
        newman run "./Clinic API.postman_collection.json" \
          -r htmlextra,json \
          --reporter-htmlextra-export ./postman-reports/report-clinic.html \
          --reporter-json-export ./postman-reports/summary-clinic.json

    - name: Run Admin API Tests
      run: |
        newman run "./Admin API.postman_collection.json" \
          -r htmlextra,json \
          --reporter-htmlextra-export ./postman-reports/report-admin.html \
          --reporter-json-export ./postman-reports/summary-admin.json

    # ==========================================
    # ĐẨY BÁO CÁO LÊN ARTIFACTS ĐỂ TẢI VỀ MÁY
    # ==========================================
    - name: Upload Test Reports Artifacts
      uses: actions/upload-artifact@v4
      if: always() # Luôn luôn chạy kể cả test Pass hay Fail để lấy file báo cáo
      with:
        name: Complete-Postman-Test-Reports
        path: postman-reports/

    # ==========================================
    # TỰ ĐỘNG LOG BUG LÊN JIRA KHI CÓ ĐOẠN TEST FAIL
    # ==========================================
    - name: Login to Jira & Create Bug Ticket
      if: failure() # CHỈ KÍCH HOẠT KHI CÓ ÍT NHẤT 1 MODULE BỊ ĐỎ (FAIL)
      uses: atlassian/gajira-create@v3
      with:
        project: 'KCPM' # Thay bằng Mã Project (Project Key) viết hoa trên Jira của nhóm bạn
        issuetype: 'Bug'
        summary: '❌ [CI/CD] Kiểm thử API tự động bị sập - Phát hiện lỗi hệ thống'
        description: |
          Hệ thống kiểm thử tự động Newman trên GitHub Actions phát hiện có API không trả về trạng thái 200 OK thành công.
          
          *Thông tin chi tiết:*
          - **Người thực hiện:** ${{ github.actor }}
          - **Nhánh Code:** ${{ github.ref_name }}
          - **Chi tiết log lỗi:** Vui lòng truy cập tab Actions trên GitHub hoặc tải file `Complete-Postman-Test-Reports` trong mục Artifacts để xem biểu đồ HTML chi tiết.
        fields: '{"priority": {"name": "High"}}'
      env:
        JIRA_BASE_URL: https://kcpm99.atlassian.net # Thay bằng đường dẫn trang Jira của nhóm bạn
        JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
        JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}