name: CI Automated API Testing (Render Cloud BE)

on:
  pull_request:
    branches: [ "develop", "main" ]

jobs:
  api-verification:
    runs-on: ubuntu-latest

    steps:
    # Bước 1: Tải mã nguồn từ GitHub về để lấy cấu hình (nếu có)
    - name: Checkout Code
      uses: actions/checkout@v4

    # Bước 2: Cài đặt Node.js để chạy công cụ Newman
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    # Bước 3: Cài đặt Newman và công cụ xuất báo cáo HTML
    - name: Install Newman & Reporter
      run: npm install -g newman newman-reporter-htmlextra

    # Bước 4: Chạy test trực tiếp lên server Render bằng Postman API Key
    - name: Execute Postman Tests via API Key
      run: |
        newman run "https://api.getpostman.com/collections/${{ secrets.POSTMAN_COLLECTION_ID }}?apikey=${{ secrets.POSTMAN_API_KEY }}" \
        -e "https://api.getpostman.com/environments/${{ secrets.POSTMAN_ENVIRONMENT_ID }}?apikey=${{ secrets.POSTMAN_API_KEY }}" \
        -r cli,htmlextra \
        --reporter-htmlextra-export ./newman-report.html

    # Bước 5: Luôn luôn lưu trữ file báo cáo HTML lên GitHub
    - name: Upload Test Report Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: postman-html-report
        path: ./newman-report.html
