name: Automated API Verification & Multi-Ticket Jira Logging

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  api-verification:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Newman and HTML Extra Reporter
      run: |
        npm install -g newman
        npm install -g newman-reporter-htmlextra

    - name: Create Reports Directory
      run: mkdir -p postman-reports

    # =======================================================================
    # CHẠY TEST BẰNG FILE OFFLINE
    # =======================================================================
    - name: Run Admin API Tests
      run: |
        newman run "./test/resources/Admin API.postman_collection.json" \
          -r htmlextra,json \
          --reporter-htmlextra-export ./postman-reports/report-admin.html \
          --reporter-json-export ./postman-reports/summary-admin.json \
          --suppress-exit-code

    - name: Run Clinic API Tests
      run: |
        newman run "./test/resources/Clinic API.postman_collection.json" \
          -r htmlextra,json \
          --reporter-htmlextra-export ./postman-reports/report-clinic.html \
          --reporter-json-export ./postman-reports/summary-clinic.json \
          --suppress-exit-code

    - name: Run Doctor API Tests
      run: |
        newman run "./test/resources/Doctor API.postman_collection.json" \
          -r htmlextra,json \
          --reporter-htmlextra-export ./postman-reports/report-doctor.html \
          --reporter-json-export ./postman-reports/summary-doctor.json \
          --suppress-exit-code

    - name: Run Patient API Tests
      run: |
        newman run "./test/resources/Patient API.postman_collection.json" \
          -r htmlextra,json \
          --reporter-htmlextra-export ./postman-reports/report-patient.html \
          --reporter-json-export ./postman-reports/summary-patient.json \
          --suppress-exit-code

    # =======================================================================
    # SCRIPT VÒNG LẶP: DUYỆT TỪNG LỖI VÀ GỌI API JIRA ĐỂ TẠO MỖI LỖI 1 THẺ RIÊNG
    # =======================================================================
    - name: Parse Failures and Create Individual Jira Tickets
      env:
        JIRA_BASE_URL: https://ayemqh-1766052090391.atlassian.net
        JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
        JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        PROJECT_KEY: 'KCPM'
        ACTOR: ${{ github.actor }}
        BRANCH: ${{ github.ref_name }}
      run: |
        node -e '
        const fs = require("fs");
        const { execSync } = require("child_process");
        
        const files = [
          { name: "Admin API", file: "./postman-reports/summary-admin.json" },
          { name: "Clinic API", file: "./postman-reports/summary-clinic.json" },
          { name: "Doctor API", file: "./postman-reports/summary-doctor.json" },
          { name: "Patient API", file: "./postman-reports/summary-patient.json" }
        ];
        
        // Tạo chuỗi chứng thực Base64 để gọi API Jira trực tiếp
        const auth = Buffer.from(`${process.env.JIRA_USER_EMAIL}:${process.env.JIRA_API_TOKEN}`).toString("base64");
        
        files.forEach(item => {
          if (fs.existsSync(item.file)) {
            const data = JSON.parse(fs.readFileSync(item.file, "utf8"));
            if (data.run && data.run.failures && data.run.failures.length > 0) {
              
              // Vòng lặp quét qua từng lỗi đơn lẻ
              data.run.failures.forEach((fail) => {
                const apiName = fail.source ? fail.source.name : "Không rõ API";
                let assertionError = fail.error ? fail.error.message : "Lỗi Assert";
                assertionError = assertionError.replace(/[\r\n\"]+/g, " "); // Làm sạch chuỗi
                
                // Cấu hình tiêu đề và mô tả riêng cho từng chiếc thẻ Bug
                const summary = `❌ [CI/CD] Lỗi API: ${apiName} (${item.name})`;
                const description = `Hệ thống kiểm thử tự động phát hiện ca assert này bị gãy:\n\n` +
                                    `* Bộ kịch bản: ${item.name}\n` +
                                    `* Tên API: ${apiName}\n` +
                                    `* Chi tiết lỗi: {color:red}${assertionError}{color}\n\n` +
                                    `---\n` +
                                    `* Người kích hoạt: ${process.env.ACTOR}\n` +
                                    `* Nhánh code: ${process.env.BRANCH}\n` +
                                    `* Chi tiết đồ thị: Tải file báo cáo HTML trong mục Artifacts trên GitHub.`;
                
                // Khối dữ liệu JSON gửi sang Jira theo đúng cấu thức Atlassian API v2
                const jiraData = {
                  fields: {
                    project: { key: process.env.PROJECT_KEY },
                    summary: summary,
                    description: description,
                    issuetype: { name: "Bug" },
                    priority: { name: "High" }
                  }
                };
                
                // Tiến hành bắn API tạo thẻ ngay lập tức bằng lệnh curl
                try {
                  const curlCommand = `curl -s -X POST -H "Authorization: Basic ${auth}" ` +
                                      `-H "Content-Type: application/json" ` +
                                      `-d @- "${process.env.JIRA_BASE_URL}/rest/api/2/issue"`;
                  
                  const response = execSync(curlCommand, { input: JSON.stringify(jiraData), encoding: "utf8" });
                  const resJson = JSON.parse(response);
                  console.log(`✅ Đã tạo riêng thẻ thành công cho lỗi [${apiName}] -> Mã ticket: ${resJson.key}`);
                } catch (error) {
                  console.error(`❌ Không thể tạo thẻ cho lỗi [${apiName}]:`, error.message);
                }
              });
              
            }
          }
        });
        '

    # ==========================================
    # ĐẨY BÁO CÁO LÊN ARTIFACTS
    # ==========================================
    - name: Upload Test Reports Artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: Complete-Postman-Test-Reports
        path: postman-reports/
