name: Java Monorepo Auto Build and Test Flow

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Tải toàn bộ mã nguồn (cả FR và BE) về máy ảo
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # 2. Cài đặt môi trường Java JDK 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # 3. Biên dịch Java - Chỉ định chạy bên trong thư mục 'backend'
    # Lệnh này sẽ tạo ra file .jar bên trong thư mục 'backend/target/'
    - name: Build Java Backend with Maven
      working-directory: ./backend
      run: mvn clean package -DskipTests=false

    # 4. Chạy ngầm ứng dụng Java - Nhớ trỏ đúng đường dẫn vào thư mục 'backend'
    # (Hãy thay đổi tên file .jar cho đúng với file thực tế của bạn)
    - name: Start Java Application for API Testing
      run: |
        java -jar backend/target/du_an_cua_ban-0.0.1-SNAPSHOT.jar &

    # 5. Chờ 15 giây để ứng dụng Java khởi động xong
    - name: Wait for Application to Start
      run: sleep 15

    # 6. Cài đặt Node.js để chạy Newman (Postman)
    - name: Setup Node.js (for Newman)
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # 7. Chạy Test API tự động từ Postman
    - name: Run Postman API Tests
      run: |
        npm install -g newman
        newman run "https://api.getpostman.com/collections/${{ secrets.POSTMAN_COLLECTION_ID }}?apikey=${{ secrets.POSTMAN_API_KEY }}"

   # 8. Đăng nhập vào Jira (Giữ nguyên bước này vì log báo Successfully logged in rồi)
    - name: Login to Jira
      if: success()
      uses: atlassian/gajira-login@v3
      env:
        JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
        JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
        JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}

   # 9. Tự động tìm kiếm mã Issue/Ticket (Cấu hình nâng cấp thông minh)
    - name: Search Jira Ticket Key
      if: success()
      id: info
      uses: atlassian/gajira-find-issue-key@v3
      with:
        string: |
          ${{ github.event.pull_request.title }}
          ${{ github.event.pull_request.head.ref }}
          ${{ github.event.head_commit.message }}

    # 10. Thực hiện chuyển trạng thái Ticket sang cột mong muốn (Ví dụ: Done)
    - name: Transition Jira Ticket Status
      if: success() && steps.info.outputs.issue
      uses: atlassian/gajira-transition@v3
      with:
        issue: ${{ steps.info.outputs.issue }}
        transition: 'Done' # <-- Hãy đảm bảo cột trên bảng Jira của bạn có tên chính xác là 'Done'

    # 11. Tự động để lại bình luận (Comment) báo cáo vào trong Ticket đó
    - name: Add Comment to Jira Ticket
      if: success() && steps.info.outputs.issue
      uses: atlassian/gajira-comment@v3
      with:
        issue: ${{ steps.info.outputs.issue }}
        comment: "Pipeline Backend Java (Monorepo) đã Auto Build & Test API thành công 100%! 🎉"